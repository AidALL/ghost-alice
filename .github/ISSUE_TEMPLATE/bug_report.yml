name: Bug report
description: Report a reproducible Ghost-ALICE OS bug
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, private prompts, customer data, or local credential files.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Claude Code
        - Codex
        - Installer only
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system and shell
      placeholder: "macOS 15 / zsh, Ubuntu / bash, Windows / PowerShell"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs or output
      description: Remove secrets, private prompts, and local credential values.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed secrets and private data from this report.
          required: true
        - label: This is not a security vulnerability report.
          required: true
